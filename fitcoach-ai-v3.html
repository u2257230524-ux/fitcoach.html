// ══ FOOD / NUTRITION HELPERS ══════════════════════════
function parseOFFProduct(p){
  const n=p.nutriments||{};
  return{
    id:p.code||p._id||Math.random().toString(36).slice(2),
    name:(p.product_name_it||p.product_name||"Prodotto").trim(),
    brand:(p.brands||"").split(",")[0].trim(),
    image:p.image_front_small_url||p.image_url||null,
    per100:{
      kcal:  Math.round(n['energy-kcal_100g']||n['energy-kcal']||0),
      protein:+(n['proteins_100g']||0).toFixed(1),
      carbs:  +(n['carbohydrates_100g']||0).toFixed(1),
      fat:    +(n['fat_100g']||0).toFixed(1),
      fiber:  +(n['fiber_100g']||0).toFixed(1),
      sugar:  +(n['sugars_100g']||0).toFixed(1),
    },
    servingSize:parseFloat(p.serving_size)||100,
    servingLabel:p.serving_size||"100g",
  };
}
function macrosForGrams(food,g){
  const r=g/100;
  return{
    kcal:  Math.round(food.per100.kcal*r),
    protein:+(food.per100.protein*r).toFixed(1),
    carbs:  +(food.per100.carbs*r).toFixed(1),
    fat:    +(food.per100.fat*r).toFixed(1),
  };
}
async function searchOFF(q){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=20&fields=product_name,product_name_it,brands,nutriments,serving_size,code,image_front_small_url&sort_by=unique_scans_n`;
  const r=await fetch(url);const d=await r.json();
  return(d.products||[]).filter(p=>p.product_name&&(p.nutriments?.['energy-kcal_100g']||p.nutriments?.['energy-kcal'])>0).map(parseOFFProduct);
}
async function barcodeOFF(code){
  const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,product_name_it,brands,nutriments,serving_size,code,image_front_small_url`);
  const d=await r.json();
  if(d.status!==1||!d.product)return null;
  return parseOFFProduct({...d.product,code});
}
function todayStr(){return new Date().toLocaleDateString("it-IT");}
function getMealMacros(entries){
  return entries.reduce((a,e)=>({
    kcal:a.kcal+(e.kcal||0),protein:a.protein+(e.protein||0),
    carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)
  }),{kcal:0,protein:0,carbs:0,fat:0});
}

// ══ WORKOUT HELPERS ══════════════════════════════════
function calcVolume(sets){return sets.reduce((a,s)=>a+(s.weight||0)*(parseInt(s.reps)||0),0);}
function calc1RM(w,r){return r===1?w:Math.round(w*(1+r/30));}
function getLastPerf(log,exId){
  for(const w of log){
    const ex=w.exercises?.find(e=>e.id===exId&&e.loggedSets?.length>0);
    if(ex){const b=ex.loggedSets.reduce((a,s)=>calc1RM(s.weight,parseInt(s.reps))>calc1RM(a.weight,parseInt(a.reps))?s:a,ex.loggedSets[0]);return{weight:b.weight,reps:b.reps,date:w.date};}
  }return null;
}
function shouldIncrease(log,exId){
  const perf=[];
  for(const w of log){const ex=w.exercises?.find(e=>e.id===exId&&e.loggedSets?.length>=3);if(ex){const avg=ex.loggedSets.reduce((a,s)=>a+parseInt(s.reps||0),0)/ex.loggedSets.length;perf.push({weight:ex.loggedSets[0].weight,avgReps:avg});}if(perf.length>=2)break;}
  if(perf.length>=2){const exDef=PROGRAM.flatMap(p=>p.exercises).find(e=>e.id===exId);const t=typeof exDef?.reps==="number"?exDef.reps:10;if(perf[0].avgReps>=t+1&&perf[0].weight===perf[1].weight)return true;}
  return false;
}
function getWeeklyVolume(log){
  const wago=new Date(Date.now()-7*864e5);
  const v={chest:0,back:0,shoulders:0,biceps:0,triceps:0,core:0,legs:0};
  log.filter(w=>new Date(w.dateISO||w.date)>=wago).forEach(w=>{w.exercises?.forEach(ex=>{const d=PROGRAM.flatMap(p=>p.exercises).find(e=>e.id===ex.id);if(d&&ex.loggedSets?.length)v[d.muscle]=(v[d.muscle]||0)+ex.loggedSets.length;});});
  return v;
}
function getStreak(log){
  if(!log.length)return 0;
  const dates=[...new Set(log.map(w=>w.date))].sort((a,b)=>new Date(b.split('/').reverse().join('-'))-new Date(a.split('/').reverse().join('-')));
  const toD=s=>{const[d,m,y]=s.split('/');return new Date(y,m-1,d);};
  if(Math.floor((new Date()-toD(dates[0]))/864e5)>1)return 0;
  let streak=1;
  for(let i=1;i<dates.length;i++){if(Math.floor((toD(dates[i-1])-toD(dates[i]))/864e5)===1)streak++;else break;}
  return streak;
}

// ══ REST TIMER ═══════════════════════════════════════
function RestTimer({seconds,onDone,color}){
  const [left,setLeft]=useState(seconds);const[done,setDone]=useState(false);
  useEffect(()=>{if(left<=0){setDone(true);try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}return;}const t=setTimeout(()=>setLeft(l=>l-1),1000);return()=>clearTimeout(t);},[left]);
  const r=28,circ=2*Math.PI*r,pct=(left/seconds)*100;
  return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 0"}}>
    <div style={{position:"relative",width:68,height:68}}>
      <svg width="68" height="68" style={{transform:"rotate(-90deg)"}}>
        <circle cx="34" cy="34" r={r} fill="none" stroke="var(--border2)" strokeWidth="5"/>
        <circle cx="34" cy="34" r={r} fill="none" stroke={done?"#39ff14":color} strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} style={{transition:"stroke-dashoffset 1s linear"}}/>
      </svg>
      <div className="mono" style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:500,color:done?"#39ff14":color,animation:!done&&left<=5?"timer-blink 1s infinite":"none"}}>
        {done?"GO!":left}
      </div>
    </div>
    <div style={{fontSize:10,color:"var(--muted)"}}>{done?"💪 Forza!":"recupero"}</div>
    <button onClick={onDone} style={{background:"transparent",border:"1px solid var(--border2)",borderRadius:8,padding:"3px 12px",color:"var(--muted)",fontSize:11,cursor:"pointer"}}>{done?"Inizia":"Salta"}</button>
  </div>;
}

// ══ BARCODE SCANNER ═══════════════════════════════════
function BarcodeScanner({onDetect,onClose}){
  const videoRef=useRef(null);const streamRef=useRef(null);const rafRef=useRef(null);
  const [status,setStatus]=useState("starting");const[manualCode,setManualCode]=useState("");

  useEffect(()=>{
    let active=true;
    async function start(){
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
        if(!active){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        if(!('BarcodeDetector' in window)){setStatus("manual");return;}
        const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf']});
        setStatus("scanning");
        async function scan(){
          if(!active||!videoRef.current)return;
          try{
            const barcodes=await detector.detect(videoRef.current);
            if(barcodes.length>0){const code=barcodes[0].rawValue;if(active){try{navigator.vibrate&&navigator.vibrate(100);}catch{}onDetect(code);return;}}
          }catch{}
          rafRef.current=requestAnimationFrame(scan);
        }
        scan();
      }catch(e){if(active)setStatus("error");}
    }
    start();
    return()=>{active=false;cancelAnimationFrame(rafRef.current);streamRef.current?.getTracks().forEach(t=>t.stop());};
  },[]);

  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:100,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(0,0,0,.8)"}}>
        <div className="cond" style={{fontSize:20,fontWeight:900,color:"var(--blue)"}}>📷 SCANNER BARCODE</div>
        <button onClick={onClose} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"6px 14px",color:"white",cursor:"pointer",fontWeight:700}}>✕ Chiudi</button>
      </div>

      {/* Video */}
      <div style={{flex:1,position:"relative",overflow:"hidden",background:"#000"}}>
        <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover"}} playsInline muted/>
        {status==="scanning"&&<>
          {/* Viewfinder overlay */}
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:260,height:160,position:"relative"}}>
              {[{t:0,l:0},{t:0,r:0},{b:0,l:0},{b:0,r:0}].map((pos,i)=>(
                <div key={i} style={{position:"absolute",...pos,width:30,height:30,
                  borderTop:pos.t===0?"3px solid #00b4ff":"none",borderBottom:pos.b===0?"3px solid #00b4ff":"none",
                  borderLeft:pos.l===0?"3px solid #00b4ff":"none",borderRight:pos.r===0?"3px solid #00b4ff":"none"}}/>
              ))}
              {/* Scan line */}
              <div style={{position:"absolute",left:4,right:4,height:2,background:"linear-gradient(90deg,transparent,#00b4ff,transparent)",animation:"scan-line 2s linear infinite",boxShadow:"0 0 8px #00b4ff"}}/>
            </div>
          </div>
          <div style={{position:"absolute",bottom:20,left:0,right:0,textAlign:"center",color:"rgba(255,255,255,.7)",fontSize:13}}>Inquadra il barcode del prodotto</div>
        </>}
        {status==="starting"&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
          <div className="spin" style={{width:36,height:36,border:"3px solid var(--border)",borderTopColor:"var(--blue)",borderRadius:"50%"}}/>
          <div style={{color:"var(--muted)"}}>Avvio fotocamera...</div>
        </div>}
        {status==="error"&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:20}}>
          <div style={{fontSize:44}}>📷</div>
          <div style={{color:"var(--red)",fontWeight:600,textAlign:"center"}}>Fotocamera non accessibile</div>
          <div style={{color:"var(--muted)",fontSize:12,textAlign:"center"}}>Controlla i permessi del browser</div>
        </div>}
      </div>

      {/* Manual input */}
      <div style={{padding:"14px 16px",background:"rgba(0,0,0,.9)",borderTop:"1px solid var(--border)"}}>
        <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>
          {status==="manual"?"BarcodeDetector non supportato in questo browser — inserisci manualmente:":"Oppure inserisci il codice manualmente:"}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={manualCode} onChange={e=>setManualCode(e.target.value.replace(/\D/g,""))}
            placeholder="Es. 8001505005592" type="tel" maxLength={14}
            style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:12,padding:"10px 14px",color:"white",fontSize:15,outline:"none",flex:1,fontFamily:"'DM Mono',monospace"}}
            onKeyDown={e=>e.key==="Enter"&&manualCode.length>=8&&onDetect(manualCode)}/>
          <button onClick={()=>manualCode.length>=8&&onDetect(manualCode)}
            disabled={manualCode.length<8}
            style={{background:manualCode.length>=8?"var(--blue2)":"var(--border)",border:"none",borderRadius:12,padding:"10px 16px",color:"white",fontWeight:700,cursor:"pointer",fontSize:14,opacity:manualCode.length<8?.5:1}}>
            Cerca
          </button>
        </div>
      </div>
    </div>
  );
}

// ══ FOOD SEARCH MODAL ════════════════════════════════
function FoodSearchModal({onAdd,onClose,mealType}){
  const [query,setQuery]=useState("");const[results,setResults]=useState([]);const[loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);const[grams,setGrams]=useState("");const[showScanner,setShowScanner]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);

  const search=useCallback(async(q)=>{
    if(!q.trim()||q.trim().length<2)return;
    setLoading(true);setResults([]);
    try{const r=await searchOFF(q);setResults(r);}catch{setResults([]);}
    setLoading(false);
  },[]);

  useEffect(()=>{const t=setTimeout(()=>{if(query.trim().length>=2)search(query);},600);return()=>clearTimeout(t);},[query]);

  async function handleBarcode(code){
    setShowScanner(false);setLoading(true);setQuery(code);
    try{const p=await barcodeOFF(code);if(p){setResults([p]);setSelected(p);setGrams(String(p.servingSize||100));}else{setResults([]);alert("Prodotto non trovato nel database.\nProva a cercarlo per nome.");}}
    catch{alert("Errore di rete.");}setLoading(false);
  }

  function selectFood(food){setSelected(food);setGrams(String(Math.round(food.servingSize)||100));}

  function confirmAdd(){
    if(!selected||!grams)return;
    const g=parseFloat(grams)||100;
    const macros=macrosForGrams(selected,g);
    onAdd({id:Date.now(),foodId:selected.id,name:selected.name,brand:selected.brand,grams:g,...macros,mealType});
    setSelected(null);setQuery("");setResults([]);setGrams("");
  }

  if(showScanner)return<BarcodeScanner onDetect={handleBarcode} onClose={()=>setShowScanner(false)}/>;

  const meal=MEAL_TYPES.find(m=>m.id===mealType);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:50,display:"flex",flexDirection:"column"}}>

          <div className="cond" style={{fontSize:20,fontWeight:900}}>{meal?.icon} {meal?.label} — Aggiungi</div>
          <button onClick={onClose} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"5px 12px",color:"white",cursor:"pointer",fontWeight:700}}>✕</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)}
            placeholder="Cerca alimento... (es. pollo, pasta barilla)"
            style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:12,padding:"10px 14px",color:"white",fontSize:14,outline:"none",flex:1}}/>
          <button onClick={()=>setShowScanner(true)}
            style={{background:"var(--blue2)",border:"none",borderRadius:12,padding:"10px 14px",color:"white",fontWeight:700,cursor:"pointer",fontSize:18,flexShrink:0}}>

        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 0 80px"}}>
        {loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:30}}>
          <div className="spin" style={{width:28,height:28,border:"3px solid var(--border)",borderTopColor:"var(--blue)",borderRadius:"50%"}}/>
          <div style={{fontSize:13,color:"var(--muted)"}}>Ricerca su Open Food Facts...</div>
        </div>}

        {!loading&&query.length>=2&&results.length===0&&<div style={{padding:30,textAlign:"center",color:"var(--muted)"}}>
          <div style={{fontSize:36,marginBottom:8}}>🔍</div>
          <div>Nessun risultato. Prova con un nome diverso o scansiona il barcode.</div>
        </div>}

        {/* Selected food detail */}
        {selected&&(
          <div style={{background:"var(--card)",border:`1px solid ${meal?.color||"var(--blue)"}44`,borderRadius:16,margin:"12px 14px",padding:14}} className="slide-up">
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              {selected.image&&<img src={selected.image} alt="" style={{width:52,height:52,borderRadius:10,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected.name}</div>
                {selected.brand&&<div style={{fontSize:11,color:"var(--muted)"}}>{selected.brand}</div>}
                <div style={{fontSize:10,color:"var(--dim)",marginTop:2}}>per 100g: {selected.per100.kcal}kcal · P{selected.per100.protein}g · C{selected.per100.carbs}g · G{selected.per100.fat}g</div>
              </div>
            </div>

            {/* Grams input */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:10,color:"var(--dim)",marginBottom:4}}>GRAMMI / PORZIONE</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>

                  <input value={grams} onChange={e=>setGrams(e.target.value)} type="number"

                ))}
              </div>
            </div>

            {/* Live macros preview */}
            {grams&&(() => {
              const g=parseFloat(grams)||0;const m=macrosForGrams(selected,g);
              return<div style={{background:"var(--bg2)",borderRadius:12,padding:"10px 12px",display:"flex",justifyContent:"space-between"}}>
                <div style={{textAlign:"center"}}><div className="mono" style={{fontSize:16,fontWeight:500,color:"#f59e0b"}}>{m.kcal}</div><div style={{fontSize:9,color:"var(--dim)"}}>kcal</div></div>
                <div style={{textAlign:"center"}}><div className="mono" style={{fontSize:16,fontWeight:500,color:"#3b82f6"}}>{m.protein}g</div><div style={{fontSize:9,color:"var(--dim)"}}>prot</div></div>
                <div style={{textAlign:"center"}}><div className="mono" style={{fontSize:16,fontWeight:500,color:"#22c55e"}}>{m.carbs}g</div><div style={{fontSize:9,color:"var(--dim)"}}>carb</div></div>
                <div style={{textAlign:"center"}}><div className="mono" style={{fontSize:16,fontWeight:500,color:"#a855f7"}}>{m.fat}g</div><div style={{fontSize:9,color:"var(--dim)"}}>grassi</div></div>

            })()}

            <div style={{display:"flex",gap:8,marginTop:10}}>

                style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:"10px 12px",marginBottom:8,cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}
                onMouseDown={e=>e.currentTarget.style.background="var(--card2)"}
                onMouseUp={e=>e.currentTarget.style.background="var(--card)"}>
                {food.image?<img src={food.image} alt="" style={{width:42,height:42,borderRadius:8,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>
                  :<div style={{width:42,height:42,borderRadius:8,background:"var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🍽️</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{food.name}</div>
                  {food.brand&&<div style={{fontSize:11,color:"var(--muted)"}}>{food.brand}</div>}
                  <div style={{fontSize:10,color:"var(--dim)",marginTop:2}}>
                    <span style={{color:"#f59e0b"}}>{food.per100.kcal}kcal</span> · P<span style={{color:"#3b82f6"}}>{food.per100.protein}g</span> · C{food.per100.carbs}g · G{food.per100.fat}g <span style={{color:"var(--dim)"}}>/ 100g</span>
                  </div>
                </div>
                <div style={{color:"var(--border2)",fontSize:20}}>›</div>

        {/* Empty state */}
        {!loading&&!query&&(

            <div style={{fontSize:44,marginBottom:10}}>🔍</div>
            <div style={{fontWeight:600,marginBottom:6}}>Cerca qualsiasi alimento</div>
            <div style={{fontSize:12,color:"var(--dim)",lineHeight:1.7}}>

            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:14}}>

// ══ NUTRITION SCREEN ═════════════════════════════════
function NutritionScreen({nutrition,setNutrition}){
  const [activeDate,setActiveDate]=useState(todayStr());
  const [showAddModal,setShowAddModal]=useState(null);// mealType id
  const [tab,setTab]=useState("oggi");

  const dayData=nutrition.find(d=>d.date===activeDate)||{date:activeDate,meals:{colazione:[],pranzo:[],cena:[],spuntino:[]}};

  function ensureDay(date){return nutrition.find(d=>d.date===date)||{date,meals:{colazione:[],pranzo:[],cena:[],spuntino:[]}};}

  function addEntry(mealType,entry){
    setNutrition(prev=>{
      const day=ensureDay(activeDate);
      const updated={...day,meals:{...day.meals,[mealType]:[...(day.meals[mealType]||[]),entry]}};
      const others=prev.filter(d=>d.date!==activeDate);
      return[...others,updated].sort((a,b)=>new Date(b.date.split('/').reverse().join('-'))-new Date(a.date.split('/').reverse().join('-')));
    });
  }

  function removeEntry(mealType,entryId){
    setNutrition(prev=>{
      const day=ensureDay(activeDate);
      const updated={...day,meals:{...day.meals,[mealType]:(day.meals[mealType]||[]).filter(e=>e.id!==entryId)}};
      return prev.map(d=>d.date===activeDate?updated:d);
    });
  }

  // Calc totals
  const allEntries=Object.values(dayData.meals||{}).flat();
  const totals=allEntries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),protein:a.protein+(e.protein||0),carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)}),{kcal:0,protein:0,carbs:0,fat:0});
  const kcalLeft=DAILY_GOALS.kcal-totals.kcal;
  const proteinPct=(totals.protein/DAILY_GOALS.protein)*100;

  // Last 7 days for chart
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-6+i);
    const ds=d.toLocaleDateString("it-IT");
    const day=nutrition.find(n=>n.date===ds);
    const tot=day?Object.values(day.meals||{}).flat().reduce((a,e)=>a+(e.kcal||0),0):0;
    return{data:ds.slice(0,5),kcal:tot,prot:day?Object.values(day.meals||{}).flat().reduce((a,e)=>a+(e.protein||0),0):0};
  });

  return(
    <div style={{height:"calc(100vh - 116px)",display:"flex",flexDirection:"column"}}>
      {/* Sub tabs */}
      <div style={{display:"flex",gap:0,background:"var(--bg2)",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        {[["oggi","📋","Diario"],["settimana","📈","Settimana"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{background:"none",border:"none",borderBottom:`2px solid ${tab===id?"var(--green2)":"transparent"}`,padding:"10px 0",color:tab===id?"var(--green2)":"var(--dim)",cursor:"pointer",fontSize:13,fontWeight:700,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            {icon} {label}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="oggi"&&(
          <div style={{padding:"14px 14px 80px"}} className="slide-up">
            {/* Summary ring */}
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:18,padding:16,marginBottom:14}}>
              <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:14}}>
                <CircleProgress pct={(totals.kcal/DAILY_GOALS.kcal)*100} size={90} stroke={8} color={kcalLeft<0?"#ef4444":"#f59e0b"}>
                  <div style={{textAlign:"center"}}>
                    <div className="mono" style={{fontSize:17,fontWeight:500,color:kcalLeft<0?"#ef4444":"#f59e0b",lineHeight:1}}>{totals.kcal}</div>
                    <div style={{fontSize:8,color:"var(--dim)"}}>kcal</div>
                  </div>
                </CircleProgress>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"var(--muted)",marginBottom:2}}>
                    {kcalLeft>0?<span>Rimanenti: <span style={{color:"var(--green2)",fontWeight:700}}>{kcalLeft} kcal</span></span>
                     :<span style={{color:"var(--red)"}}>Superato di {Math.abs(kcalLeft)} kcal</span>}
                  </div>
                  <div style={{fontSize:11,color:"var(--dim)"}}>Target: {DAILY_GOALS.kcal} kcal/giorno</div>
                  <div style={{marginTop:8,display:"flex",gap:8"}}>
                    <Tag color={proteinPct>=100?"#22c55e":"#f59e0b"}>P {totals.protein}g{proteinPct>=100?" ✓":""}</Tag>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <MacroBar label={`Proteine — target ${DAILY_GOALS.protein}g`} val={totals.protein} max={DAILY_GOALS.protein} color="#3b82f6"/>
                <MacroBar label={`Carboidrati — target ${DAILY_GOALS.carbs}g`} val={totals.carbs} max={DAILY_GOALS.carbs} color="#22c55e"/>
                <MacroBar label={`Grassi — target ${DAILY_GOALS.fat}g`} val={totals.fat} max={DAILY_GOALS.fat} color="#a855f7"/>
              </div>
            </div>

            {/* Meals */}
            {MEAL_TYPES.map(meal=>{
              const entries=dayData.meals?.[meal.id]||[];
              const mTotals=entries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),protein:a.protein+(e.protein||0)}),{kcal:0,protein:0});
              return(
                <div key={meal.id} style={{background:"var(--card)",border:`1px solid var(--border)`,borderTop:`2px solid ${meal.color}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
                  {/* Meal header */}
                  <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:18}}>{meal.icon}</span>
                      <div>
                        <div className="cond" style={{fontWeight:800,fontSize:16,color:meal.color}}>{meal.label.toUpperCase()}</div>
                        {mTotals.kcal>0&&<div style={{fontSize:10,color:"var(--muted)"}}>{mTotals.kcal}kcal · {mTotals.protein}g prot</div>}
                      </div>
                    </div>
                    <button onClick={()=>setShowAddModal(meal.id)}
                      style={{background:`${meal.color}22`,border:`1px solid ${meal.color}44`,borderRadius:10,padding:"6px 14px",color:meal.color,cursor:"pointer",fontSize:13,fontWeight:700}}>
                      + Aggiungi
                    </button>
                  </div>

                  {/* Food entries */}
                  {entries.map(entry=>(
                    <div key={entry.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderTop:"1px solid var(--border)"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.name}</div>
                        <div style={{fontSize:10,color:"var(--dim)"}}>{entry.grams}g {entry.brand?`· ${entry.brand}`:""}</div>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,marginLeft:8}}>
                        <div style={{textAlign:"right"}}>
                          <div className="mono" style={{fontSize:13,color:"#f59e0b"}}>{entry.kcal}kcal</div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>P{entry.protein}g</div>
                        </div>
                        <button onClick={()=>removeEntry(meal.id,entry.id)}

                      </div>
                    </div>
                  ))}
                  {entries.length===0&&<div style={{padding:"8px 14px 10px",fontSize:11,color:"var(--dim)",fontStyle:"italic"}}>Nessun alimento registrato</div>}
                </div>
              );
            })}

            {/* Protein tip */}
            <div style={{background:totals.protein>=DAILY_GOALS.protein?"#0d2a1a":"#1a1200",border:`1px solid ${totals.protein>=DAILY_GOALS.protein?"#065f46":"#78350f"}`,borderRadius:12,padding:"10px 14px"}}>
              <div style={{fontSize:11,color:totals.protein>=DAILY_GOALS.protein?"#34d399":"#fbbf24",fontWeight:600,marginBottom:3}}>
                {totals.protein>=DAILY_GOALS.protein?"✓ Target proteine raggiunto!":"💡 Proteine per la massa"}
              </div>
              <div style={{fontSize:11,color:"var(--muted)"}}>
                {totals.protein>=DAILY_GOALS.protein
                  ?`${totals.protein}g ≥ ${DAILY_GOALS.protein}g — ottimo per la sintesi proteica 💪`
                  :`Servono ancora ${(DAILY_GOALS.protein-totals.protein).toFixed(0)}g · Target: ${DAILY_GOALS.protein}g/giorno (1.9g/kg · 69kg)`}
              </div>
            </div>
          </div>
        )}

        {tab==="settimana"&&(
          <div style={{padding:"14px 14px 80px"}} className="slide-up">
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:14,marginBottom:14}}>
              <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,letterSpacing:"0.1em",marginBottom:10}}>CALORIE ULTIMI 7 GIORNI</div>
              <ResponsiveContainer width="100%" height={140}>
                <BarChart data={last7} margin={{top:4,right:4,bottom:0,left:-24}}>
                  <XAxis dataKey="data" tick={{fill:"#4a5878",fontSize:9}} axisLine={false} tickLine={false}/>

              </ResponsiveContainer>
              <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:6,fontSize:10}}>
                <span><span style={{color:"#f59e0b"}}>■</span> Calorie</span>

                <div style={{fontSize:13,fontWeight:500}}>{d.data}</div>
                <div style={{display:"flex",gap:10}}>
                  <span className="mono" style={{fontSize:12,color:"#f59e0b"}}>{d.kcal}kcal</span>
                  <span className="mono" style={{fontSize:12,color:"#3b82f6"}}>{d.prot.toFixed(0)}g P</span>
                  {d.prot>=DAILY_GOALS.protein&&<Tag color="#22c55e">✓</Tag>}
                </div>
              </div>;
            })}
          </div>
        )}
      </div>

      {/* Add modal */}
      {showAddModal&&<FoodSearchModal mealType={showAddModal} onAdd={(entry)=>{addEntry(showAddModal,entry);}} onClose={()=>setShowAddModal(null)}/>}
    </div>
  );
}

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

          <span style={{fontSize:11,color:"var(--dim)"}}>⏱ {restTime}s rest</span>
          {shouldInc&&<span style={{background:"#39ff1420",border:"1px solid #39ff1444",borderRadius:8,padding:"3px 8px",fontSize:11,color:"#39ff14",fontWeight:700,animation:"pulse-green 2s infinite"}}>🔺 AUMENTA PESO!</span>}

            <span className="mono" style={{fontSize:17,color:"var(--blue)"}}>{lastPerf.weight}<span style={{fontSize:10,color:"var(--muted)"}}>kg</span></span>
            <span className="mono" style={{fontSize:17,color:"var(--muted)"}}>×{lastPerf.reps}</span>
            <span style={{fontSize:10,color:"var(--dim)"}}>1RM~{calc1RM(lastPerf.weight,lastPerf.reps)}kg</span>
          </div>
        </div>
        <div style={{fontSize:20}}>📈</div>
      </div>}

      {showTimer&&<div style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:14,marginBottom:10}}>
        <RestTimer seconds={timerSecs} onDone={()=>setShowTimer(false)} color={w.color}/>
      </div>}

      {/* Input */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        {[["KG",kg,setKg,0.5],["RIP",reps,setReps,1]].map(([label,val,set,step])=>(
          <div key={label} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:12,textAlign:"center"}}>
            <div style={{fontSize:9,color:"var(--dim)",fontWeight:700,letterSpacing:"0.1em",marginBottom:5}}>{label}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              <button onClick={()=>set(v=>String(Math.max(0,parseFloat(v||0)-step).toFixed(step<1?1:0)))} style={{background:"var(--border2)",border:"none",borderRadius:8,width:32,height:32,color:"white",fontSize:18,cursor:"pointer"}}>−</button>
              <input value={val} onChange={e=>set(e.target.value)} type="number" inputMode="decimal" style={{background:"transparent",border:"none",color:"var(--text)",fontSize:22,fontWeight:700,fontFamily:"'DM Mono',monospace",textAlign:"center",outline:"none",width:52}}/>
              <button onClick={()=>set(v=>String((parseFloat(v||0)+step).toFixed(step<1?1:0)))} style={{background:"var(--border2)",border:"none",borderRadius:8,width:32,height:32,color:"white",fontSize:18,cursor:"pointer"}}>+</button>
            </div>
          </div>
        ))}
      </div>

      <button onClick={handleLog} style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",border:"none",borderRadius:13,padding:"14px",color:"white",fontWeight:800,cursor:"pointer",fontSize:15,width:"100%",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:8,boxShadow:"0 4px 14px #22c55e33"}}>✓ REGISTRA SERIE</button>

      {currentSets.length>0&&<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:12,marginBottom:10}}>
        <div style={{fontSize:9,color:"var(--muted)",fontWeight:700,letterSpacing:"0.1em",marginBottom:7}}>SERIE · {currentSets.length}/{ex.sets}</div>
        {currentSets.map((s,i)=>{const isPR=lastPerf&&calc1RM(s.weight,s.reps)>calc1RM(lastPerf.weight,lastPerf.reps);return<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<currentSets.length-1?"1px solid var(--border)":"none"}}>
          <span style={{fontSize:11,color:"var(--dim)"}}>S{i+1}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span className="mono" style={{fontSize:13}}>{s.weight}kg×{s.reps}</span>
            {isPR&&<Tag color="#39ff14">PR!</Tag>}
          </div>
        </div>;})}
        {bestSet&&<div style={{fontSize:10,color:"var(--muted)",marginTop:6,textAlign:"right"}}>1RM: <span className="mono" style={{color:"var(--blue)"}}>{calc1RM(bestSet.weight,bestSet.reps)}kg</span></div>}
      </div>}

      <button onClick={isLast?onFinish:()=>setExIdx(i=>i+1)} style={{background:isLast?"linear-gradient(135deg,#7c3aed,#6d28d9)":"transparent",border:isLast?"none":"1px solid var(--border2)",borderRadius:13,padding:"13px",color:"white",fontWeight:700,cursor:"pointer",fontSize:14,width:"100%",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.05em",marginBottom:20,boxShadow:isLast?"0 4px 14px #7c3aed44":"none"}}>
        {isLast?"🎉 TERMINA ALLENAMENTO":"→ PROSSIMO ESERCIZIO"}
      </button>
    </div>
  </div>;
}

          <YAxis tick={{fill:"#4a5878",fontSize:9}} axisLine={false} tickLine={false}/>
          <Tooltip contentStyle={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:10,color:"white",fontSize:11}}/>
          <Bar dataKey="serie" fill="#00b4ff" radius={[4,4,0,0]} name="Serie"/>
        </BarChart></ResponsiveContainer>
      </div>}
      {log.slice(0,8).map(w=><div key={w.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderLeft:`3px solid ${w.color}`,borderRadius:13,padding:"10px 13px",marginBottom:7}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <div className="cond" style={{fontWeight:700,fontSize:15,color:w.color}}>{w.dayEmoji} {w.dayName}</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>{w.duration&&<Tag color="var(--muted)">{w.duration}min</Tag>}<span style={{fontSize:10,color:"var(--dim)"}}>{w.date}</span></div>
        </div>
        {w.exercises?.filter(e=>e.loggedSets?.length>0).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderTop:"1px solid var(--border)",fontSize:12}}>
          <span style={{color:"var(--muted)"}}>{e.name}</span>

        </div>)}
      </div>)}
    </>}
    {tab==="progressi"&&<>
      {log.length<2?<div style={{padding:40,textAlign:"center",color:"var(--dim)"}}><div style={{fontSize:36,marginBottom:8}}>📈</div>Servono almeno 2 sessioni</div>

        const perfs=log.slice(0,6).reverse().map(w=>{const e=w.exercises?.find(e=>e.id===ex.id&&e.loggedSets?.length>0);if(!e)return null;const b=e.loggedSets.reduce((a,s)=>calc1RM(s.weight,parseInt(s.reps))>calc1RM(a.weight,parseInt(a.reps))?s:a,e.loggedSets[0]);return{rm:calc1RM(b.weight,b.reps)};}).filter(Boolean);
        if(!perfs.length)return null;

        return<div key={ex.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)"}}>

        </div>;
      }).filter(Boolean)}
    </>}
    {tab==="misure"&&<>
      <div style={{background:"var(--card)",border:"1px solid #2563eb33",borderRadius:14,padding:14,marginBottom:12}}>

          {[["⚖️",BASELINE.weight+"kg","Peso","#f97316"],["📊",BASELINE.bodyFat+"%","BF±5-8","#ef4444"],["💪",BASELINE.leanMass+"kg","Magra","#22c55e"]].map(([icon,val,label,color])=>(
            <div key={label} style={{background:"var(--bg2)",borderRadius:12,padding:"9px 6px",textAlign:"center",borderTop:`2px solid ${color}`}}>
              <div style={{fontSize:15,marginBottom:2}}>{icon}</div><div className="mono" style={{fontSize:14,color}}>{val}</div><div style={{fontSize:9,color:"var(--dim)",marginTop:1}}>{label}</div>
            </div>
          ))}
        </div>
        {[["Petto",BASELINE.chest],["Vita",BASELINE.waist],["Stomaco",BASELINE.stomach],["Bicipite Sx",BASELINE.bicepL],["Bicipite Dx",BASELINE.bicepR],["Coscia Sx",BASELINE.thighL],["Coscia Dx",BASELINE.thighR]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
            <span style={{fontSize:12,color:"var(--muted)"}}>{l}</span>
            <span className="mono" style={{fontSize:12,color:"var(--blue)"}}>{v} cm</span>
          </div>
        ))}
      </div>
    </>}
    <div style={{height:20}}/>
  </div>;
}

// Open Food Facts helpers (global scope for use in components)
async function searchOFF(q){
  const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=20&fields=product_name,product_name_it,brands,nutriments,serving_size,code,image_front_small_url&sort_by=unique_scans_n`;
  const r=await fetch(url);const d=await r.json();
  return(d.products||[]).filter(p=>p.product_name&&(p.nutriments?.['energy-kcal_100g']||p.nutriments?.['energy-kcal'])>0).map(parseOFFProduct);
}
async function barcodeOFF(code){
  const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,product_name_it,brands,nutriments,serving_size,code,image_front_small_url`);
  const d=await r.json();if(d.status!==1||!d.product)return null;return parseOFFProduct({...d.product,code});
}
function parseOFFProduct(p){
  const n=p.nutriments||{};
  return{id:p.code||p._id||Math.random().toString(36).slice(2),name:(p.product_name_it||p.product_name||"Prodotto").trim(),brand:(p.brands||"").split(",")[0].trim(),image:p.image_front_small_url||null,
    per100:{kcal:Math.round(n['energy-kcal_100g']||n['energy-kcal']||0),protein:+(n['proteins_100g']||0).toFixed(1),carbs:+(n['carbohydrates_100g']||0).toFixed(1),fat:+(n['fat_100g']||0).toFixed(1),fiber:+(n['fiber_100g']||0).toFixed(1)},
    servingSize:parseFloat(p.serving_size)||100,servingLabel:p.serving_size||"100g"};
}
function macrosForGrams(food,g){const r=g/100;return{kcal:Math.round(food.per100.kcal*r),protein:+(food.per100.protein*r).toFixed(1),carbs:+(food.per100.carbs*r).toFixed(1),fat:+(food.per100.fat*r).toFixed(1)};}
